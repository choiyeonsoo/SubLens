version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: sublens-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sublens
      POSTGRES_USER: sublens
      POSTGRES_PASSWORD: sublens0223
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: sublens-redis
    ports:
      - "6379:6379"
