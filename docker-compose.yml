version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: pkms-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pkms
      POSTGRES_USER: pkms
      POSTGRES_PASSWORD: pkms123
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  backend:
    build: ./backend
    container_name: pkms-backend
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/pkms
      - SPRING_DATASOURCE_USERNAME=pkms
      - SPRING_DATASOURCE_PASSWORD=pkms123
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
  frontend:
    build: ./frontend
    container_name: pkms-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
volumes:
  postgres_data:
