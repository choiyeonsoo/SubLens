<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUBLENS AI 테스트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Settings Bar ── */
  #settings {
    background: #1e293b;
    border-bottom: 1px solid #334155;
    padding: 10px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  #settings label {
    font-size: 11px;
    color: #94a3b8;
    white-space: nowrap;
  }

  #settings input {
    background: #0f172a;
    border: 1px solid #334155;
    color: #e2e8f0;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 12px;
    outline: none;
    transition: border-color .2s;
  }
  #settings input:focus { border-color: #7c3aed; }
  #inp-user   { width: 220px; }
  #inp-session { width: 220px; }
  #inp-api    { width: 240px; }

  #btn-reset {
    background: #334155;
    color: #94a3b8;
    border: none;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
  }
  #btn-reset:hover { background: #475569; color: #e2e8f0; }

  /* ── Main Layout ── */
  #layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ── Chat Panel ── */
  #chat-panel {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
    border-right: 1px solid #334155;
  }

  #chat-header {
    padding: 14px 20px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    font-size: 15px;
    font-weight: 600;
    color: #c4b5fd;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  #chat-header span.dot {
    width: 8px; height: 8px;
    background: #22c55e;
    border-radius: 50%;
    display: inline-block;
  }

  /* Quick question buttons */
  #quick-btns {
    padding: 10px 16px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .quick-btn {
    background: #0f172a;
    border: 1px solid #334155;
    color: #94a3b8;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .quick-btn:hover {
    border-color: #7c3aed;
    color: #c4b5fd;
    background: #1e1040;
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

  .msg-row {
    display: flex;
    flex-direction: column;
    max-width: 72%;
  }
  .msg-row.user { align-self: flex-end; align-items: flex-end; }
  .msg-row.ai   { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 10px;
    color: #64748b;
    margin-bottom: 4px;
    padding: 0 4px;
  }

  .msg-bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg-row.user .msg-bubble {
    background: #166534;
    color: #dcfce7;
    border-bottom-right-radius: 4px;
  }
  .msg-row.ai .msg-bubble {
    background: #1e293b;
    color: #e2e8f0;
    border: 1px solid #334155;
    border-bottom-left-radius: 4px;
  }

  /* Loading dots */
  .loading-dots {
    display: flex;
    gap: 4px;
    padding: 12px 14px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 14px;
    border-bottom-left-radius: 4px;
  }
  .loading-dots span {
    width: 7px; height: 7px;
    background: #7c3aed;
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .loading-dots span:nth-child(2) { animation-delay: .2s; }
  .loading-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: .4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  /* Error banner */
  #error-banner {
    display: none;
    background: #7f1d1d;
    border: 1px solid #ef4444;
    color: #fca5a5;
    padding: 8px 16px;
    font-size: 13px;
    flex-shrink: 0;
  }

  /* Input area */
  #input-area {
    padding: 12px 16px;
    background: #1e293b;
    border-top: 1px solid #334155;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    background: #0f172a;
    border: 1px solid #334155;
    color: #e2e8f0;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
    resize: none;
    height: 42px;
    transition: border-color .2s;
    font-family: inherit;
  }
  #msg-input:focus { border-color: #7c3aed; }
  #msg-input::placeholder { color: #475569; }

  #btn-send {
    background: #7c3aed;
    color: #fff;
    border: none;
    padding: 0 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
  }
  #btn-send:hover { background: #6d28d9; }
  #btn-send:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

  /* ── Debug Panel ── */
  #debug-panel {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #0f172a;
    overflow-y: auto;
  }
  #debug-panel::-webkit-scrollbar { width: 4px; }
  #debug-panel::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

  #debug-header {
    padding: 14px 16px;
    background: #1e293b;
    border-bottom: 1px solid #334155;
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
    flex-shrink: 0;
  }

  #debug-body {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .debug-section { display: flex; flex-direction: column; gap: 6px; }
  .debug-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #64748b;
    font-weight: 600;
  }
  .debug-value {
    font-size: 13px;
    color: #cbd5e1;
  }

  /* Type badge */
  .type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .03em;
  }
  .badge-type_1 { background: #1e3a5f; color: #60a5fa; border: 1px solid #2563eb; }
  .badge-type_2 { background: #1e293b; color: #94a3b8; border: 1px solid #475569; }
  .badge-type_3 { background: #431407; color: #fb923c; border: 1px solid #ea580c; }
  .badge-type_4 { background: #2e1065; color: #c4b5fd; border: 1px solid #7c3aed; }
  .badge-empty  { background: #1e293b; color: #475569; border: 1px solid #334155; }

  /* Confidence bar */
  .confidence-wrap { display: flex; flex-direction: column; gap: 4px; }
  .confidence-bar-bg {
    width: 100%;
    height: 6px;
    background: #334155;
    border-radius: 3px;
    overflow: hidden;
  }
  .confidence-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: #7c3aed;
    transition: width .4s ease;
  }
  .confidence-pct { font-size: 13px; color: #c4b5fd; font-weight: 600; }

  /* Timing */
  .timing-value { color: #34d399; font-size: 13px; font-weight: 600; }

  /* Raw JSON toggle */
  .json-toggle {
    background: #334155;
    border: none;
    color: #94a3b8;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background .2s;
  }
  .json-toggle:hover { background: #475569; color: #e2e8f0; }
  .json-body {
    background: #0a0f1e;
    border: 1px solid #334155;
    border-radius: 6px;
    padding: 10px;
    font-size: 11px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    color: #7dd3fc;
    white-space: pre-wrap;
    word-break: break-all;
    display: none;
    max-height: 300px;
    overflow-y: auto;
  }
  .json-body.open { display: block; }

  #debug-placeholder {
    color: #334155;
    font-size: 13px;
    text-align: center;
    padding: 40px 20px;
    line-height: 1.8;
  }

  /* Divider */
  .debug-divider { border: none; border-top: 1px solid #1e293b; margin: 0; }
</style>
</head>
<body>

<!-- Settings Bar -->
<div id="settings">
  <label>USER ID</label>
  <input id="inp-user" type="text" value="58fab546-e395-407f-9f6d-ae7940f46fc7" spellcheck="false">
  <label>SESSION ID</label>
  <input id="inp-session" type="text" spellcheck="false">
  <label>API URL</label>
  <input id="inp-api" type="text" value="http://localhost:8001/api/ai/query" spellcheck="false">
  <button id="btn-reset">세션 초기화</button>
</div>

<!-- Main Layout -->
<div id="layout">

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div id="chat-header">
      <span class="dot"></span>
      SUBLENS AI 테스트
    </div>

    <div id="quick-btns">
      <button class="quick-btn" data-q="이번 달 구독료 총액이 얼마야?">이번 달 구독료 총액이 얼마야?</button>
      <button class="quick-btn" data-q="내 구독 최적화해줘">내 구독 최적화해줘</button>
      <button class="quick-btn" data-q="유독 해지하면 위약금 있어?">유독 해지하면 위약금 있어?</button>
      <button class="quick-btn" data-q="구독 어떻게 추가해?">구독 어떻게 추가해?</button>
      <button class="quick-btn" data-q="넷플릭스랑 유튜브 프리미엄 번들이 나한테 이득이야?">넷플릭스랑 유튜브 번들 이득이야?</button>
    </div>

    <div id="error-banner" role="alert"></div>

    <div id="messages">
      <div class="msg-row ai">
        <div class="msg-label">SUBLENS AI</div>
        <div class="msg-bubble">안녕하세요! SUBLENS AI입니다.<br>구독 관련 질문이나 최적화 추천을 도와드릴게요. 무엇이든 물어보세요!</div>
      </div>
    </div>

    <div id="input-area">
      <textarea id="msg-input" placeholder="질문을 입력하세요..." rows="1"></textarea>
      <button id="btn-send">전송</button>
    </div>
  </div>

  <!-- Debug Panel -->
  <div id="debug-panel">
    <div id="debug-header">디버그 패널</div>
    <div id="debug-body">
      <div id="debug-placeholder">질문을 보내면<br>분류 결과와<br>응답 정보가 표시됩니다.</div>
    </div>
  </div>

</div>

<script>
  // ── Utilities ──────────────────────────────────────────────
  function uuid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  function parseMarkdown(text) {
    // Bold: **text** → <strong>text</strong>
    return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ── Init session ───────────────────────────────────────────
  const inpSession = document.getElementById('inp-session');
  inpSession.value = uuid();

  // ── Elements ───────────────────────────────────────────────
  const inpUser    = document.getElementById('inp-user');
  const inpApi     = document.getElementById('inp-api');
  const btnReset   = document.getElementById('btn-reset');
  const msgInput   = document.getElementById('msg-input');
  const btnSend    = document.getElementById('btn-send');
  const messages   = document.getElementById('messages');
  const errBanner  = document.getElementById('error-banner');
  const debugBody  = document.getElementById('debug-body');

  // ── Quick buttons ──────────────────────────────────────────
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      msgInput.value = btn.dataset.q;
      msgInput.focus();
    });
  });

  // ── Session reset ──────────────────────────────────────────
  btnReset.addEventListener('click', () => {
    inpSession.value = uuid();
    messages.innerHTML = `
      <div class="msg-row ai">
        <div class="msg-label">SUBLENS AI</div>
        <div class="msg-bubble">세션이 초기화됐습니다. 새로운 대화를 시작하세요!</div>
      </div>`;
    debugBody.innerHTML = '<div id="debug-placeholder">질문을 보내면<br>분류 결과와<br>응답 정보가 표시됩니다.</div>';
    hideError();
  });

  // ── Error helpers ──────────────────────────────────────────
  function showError(msg) {
    errBanner.textContent = '⚠ ' + msg;
    errBanner.style.display = 'block';
  }
  function hideError() {
    errBanner.style.display = 'none';
  }

  // ── Append chat message ────────────────────────────────────
  function appendMessage(role, content) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? '나' : 'SUBLENS AI';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = parseMarkdown(escapeHtml(content).replace(/\n/g, '<br>'));

    row.appendChild(label);
    row.appendChild(bubble);
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
    return row;
  }

  function appendLoading() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = 'loading-row';
    row.innerHTML = `
      <div class="msg-label">SUBLENS AI</div>
      <div class="loading-dots">
        <span></span><span></span><span></span>
      </div>`;
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeLoading() {
    const el = document.getElementById('loading-row');
    if (el) el.remove();
  }

  // ── Debug panel update ────────────────────────────────────
  const TYPE_LABELS = {
    type_1: '내 데이터',
    type_2: '서비스 안내',
    type_3: '번들 문의',
    type_4: '최적화 추천',
  };

  function updateDebug(data, elapsedMs) {
    const type      = data.query_type || '';
    const conf      = typeof data.confidence === 'number' ? data.confidence : 0;
    const reason    = data.reason || '—';
    const pct       = Math.round(conf * 100);
    const label     = TYPE_LABELS[type] || type;

    debugBody.innerHTML = `
      <div class="debug-section">
        <div class="debug-label">Query Type</div>
        <div>
          <span class="type-badge badge-${type || 'empty'}">${type ? `${type} · ${label}` : '—'}</span>
        </div>
      </div>
      <hr class="debug-divider">

      <div class="debug-section">
        <div class="debug-label">Confidence</div>
        <div class="confidence-wrap">
          <div class="confidence-pct">${pct}%</div>
          <div class="confidence-bar-bg">
            <div class="confidence-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
      </div>
      <hr class="debug-divider">

      <div class="debug-section">
        <div class="debug-label">Reason</div>
        <div class="debug-value">${escapeHtml(reason)}</div>
      </div>
      <hr class="debug-divider">

      <div class="debug-section">
        <div class="debug-label">처리 시간</div>
        <div class="timing-value">${elapsedMs} ms</div>
      </div>
      <hr class="debug-divider">

      <div class="debug-section">
        <div class="debug-label">API 응답 원문</div>
        <button class="json-toggle" onclick="
          const b = this.nextElementSibling;
          const open = b.classList.toggle('open');
          this.textContent = open ? '▲ 접기' : '▶ 펼치기';
        ">▶ 펼치기</button>
        <pre class="json-body">${escapeHtml(JSON.stringify(data, null, 2))}</pre>
      </div>
    `;
  }

  function debugError(msg, elapsedMs) {
    debugBody.innerHTML = `
      <div class="debug-section">
        <div class="debug-label">오류</div>
        <div class="debug-value" style="color:#f87171">${escapeHtml(msg)}</div>
      </div>
      <hr class="debug-divider">
      <div class="debug-section">
        <div class="debug-label">처리 시간</div>
        <div class="timing-value">${elapsedMs} ms</div>
      </div>
    `;
  }

  // ── Send message ──────────────────────────────────────────
  async function sendMessage() {
    const question = msgInput.value.trim();
    if (!question) return;

    const userId    = inpUser.value.trim();
    const sessionId = inpSession.value.trim();
    const apiUrl    = inpApi.value.trim();

    if (!userId || !sessionId || !apiUrl) {
      showError('USER ID, SESSION ID, API URL을 모두 입력해주세요.');
      return;
    }

    hideError();
    msgInput.value = '';
    msgInput.style.height = '42px';
    btnSend.disabled = true;

    appendMessage('user', question);
    appendLoading();

    const startTime = performance.now();

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);

    try {
      const res = await fetch(apiUrl, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, question, session_id: sessionId }),
        signal: controller.signal,
      });

      clearTimeout(timeout);
      const elapsed = Math.round(performance.now() - startTime);

      if (!res.ok) {
        const errText = await res.text().catch(() => `HTTP ${res.status}`);
        throw new Error(`서버 오류 (${res.status}): ${errText}`);
      }

      const data = await res.json();
      removeLoading();
      appendMessage('ai', data.answer || '(응답 없음)');
      updateDebug(data, elapsed);

    } catch (err) {
      clearTimeout(timeout);
      const elapsed = Math.round(performance.now() - startTime);
      removeLoading();

      let errMsg;
      if (err.name === 'AbortError') {
        errMsg = '응답 시간이 초과됐습니다. (30초)';
      } else if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
        errMsg = '서버에 연결할 수 없습니다. FastAPI 서버가 실행 중인지 확인해주세요.';
      } else {
        errMsg = err.message;
      }

      appendMessage('ai', errMsg);
      showError(errMsg);
      debugError(err.message, elapsed);
    } finally {
      btnSend.disabled = false;
      msgInput.focus();
    }
  }

  // ── Event listeners ────────────────────────────────────────
  btnSend.addEventListener('click', sendMessage);

  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = '42px';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
